name: Build Windows (x64)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'electron/**'
      - 'web/**'
      - 'package.json'
      - 'electron-builder.yml'
      - 'tsconfig.json'
      - '.github/workflows/build-win.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts skips postinstall (electron-builder install-app-deps)
        # which fails on node-pty native rebuild due to missing distutils.
        # npmRebuild:false in electron-builder.yml prevents rebuild at pack time.
        run: npm ci --ignore-scripts

      - name: Build & package (Windows x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
