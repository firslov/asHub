# Build macOS (ARM64) + Windows (x64) releases
# Triggered on version tags (v*) and manually via workflow_dispatch.
#
# Both platforms build in parallel. After both succeed, a release job
# downloads all artifacts and creates a single GitHub Release — avoiding
# the race condition caused by two parallel "Create Release" steps competing
# for the same tag.
#
# Output:
#   - macOS: .dmg
#   - Windows: .exe (NSIS installer)

name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install distutils
        run: python3 -m pip install setuptools

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript build
        run: npm run build

      - name: Build Electron app (macOS ARM64)
        # --publish never: release is handled by the dedicated release job
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sh-hub-mac-arm64-${{ github.sha }}
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install distutils
        run: python3 -m pip install setuptools

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript build
        run: npm run build

      - name: Build Electron app (Windows x64)
        # --publish never: release is handled by the dedicated release job
        run: npx electron-builder --win --x64 --publish never
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-sh-hub-win-x64-${{ github.sha }}
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

  release:
    needs: [build-mac, build-win]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-sh-hub-mac-arm64-${{ github.sha }}
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: agent-sh-hub-win-x64-${{ github.sha }}
          path: release/

      - name: List release assets
        run: ls -la release/

      - name: Create GitHub Release
        run: |
          set -x
          TOKEN="${{ github.token }}"
          
          echo "=== Testing token ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}")
          echo "Repo access: HTTP $HTTP_CODE"
          
          echo "=== Release assets ==="
          ls -la release/
          
          echo "=== Creating release for tag: ${{ github.ref_name }} ==="
          # Create the release first
          RESP=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"${{ github.ref_name }}\",\"generate_release_notes\":true}")
          
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          echo "Create release: HTTP $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "201" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          
          # Get the upload URL
          UPLOAD_URL=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin)['upload_url'].replace('{?name,label}',''))")
          
          # Upload each asset
          for f in release/*.dmg release/*.exe release/*.blockmap; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading: $name"
            curl -s --fail-with-body \
              -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/octet-stream" \
              "$UPLOAD_URL?name=$name" \
              --data-binary "@$f"
          done
          
          echo "=== Release created successfully ==="
