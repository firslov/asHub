<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="geometricPrecision">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1a20"/>
      <stop offset="100%" stop-color="#0e0e12"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="64" y="64" width="384" height="384" rx="72" fill="url(#bg)"/>
  <rect x="64" y="64" width="384" height="384" rx="72" fill="none" stroke="url(#border)" stroke-width="2"/>

  <!-- Inner subtle border -->
  <rect x="80" y="80" width="352" height="352" rx="58" fill="none" stroke="rgba(34,197,94,0.06)" stroke-width="1"/>

  <!-- Prompt symbol >_ -->
  <g filter="url(#glow)">
    <!-- > chevron shadow -->
    <path d="M156 168 L156 344" stroke="#22c55e" stroke-width="26" stroke-linecap="round" opacity="0.25"/>
    <!-- > chevron -->
    <path d="M156 168 L268 256 L156 344" fill="none" stroke="#22c55e" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- _ cursor -->
    <rect x="296" y="240" width="8" height="56" rx="4" fill="#38bdf8"/>
  </g>
</svg>
